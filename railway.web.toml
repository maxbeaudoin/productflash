# Railway config for the "web" service (TanStack Start app).
#
# Product Flash runs TWO services from this repo, each selected by setting
# RAILWAY_CONFIG_FILE on the service in the Railway dashboard:
#
#   web    → RAILWAY_CONFIG_FILE=railway.web.toml    (this file)
#   worker → RAILWAY_CONFIG_FILE=railway.worker.toml
#
# Both services share env (DATABASE_URL, ANTHROPIC_API_KEY, etc).

[build]
builder = "nixpacks"

[deploy]
# Migrations run here (not on the worker) so there's a single, ordered point
# of application — a failure blocks the web rollout instead of racing.
# Assumes migrations are additive (new tables/columns/indexes): the worker
# can redeploy independently and run old code against the new schema safely.
# Coordinated breaking changes need to be sequenced manually.
preDeployCommand = "pnpm db:migrate"
startCommand = "pnpm start"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
healthcheckPath = "/healthz"
healthcheckTimeout = 30
