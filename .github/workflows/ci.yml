name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same branch — pushing a new commit while
# CI is still chewing on the previous one is the common case.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fast feedback: typecheck + unit tests. Runs on every PR push.
  fast:
    name: typecheck + unit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck

      - run: pnpm test

  # Slow feedback: integration + e2e against a real Postgres. ubuntu-latest
  # has Docker pre-installed so testcontainers works out of the box. Runs
  # in parallel with `fast` — failures don't block fast-lane signal.
  slow:
    name: integration + e2e
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Cache Playwright browsers — saves ~80MB download on every run.
      # Key by the @playwright/test version so a bump invalidates cleanly.
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright browser + deps
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium

      - name: Install Playwright system deps only (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps chromium

      - name: Integration tests
        run: pnpm test:integration

      - name: E2E tests
        run: pnpm test:e2e

      - name: Upload Playwright trace artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7
